<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Night Out Availability Survey</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f5f5f5;
      padding: 20px;
      line-height: 1.6;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 1.5rem;
      color: #222;
    }

    h3 {
      font-size: 16px;
      margin: 2rem 0 1rem;
      color: #333;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label[for="name"] {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="text"] {
      width: 100%;
      max-width: 300px;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #4a90e2;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
    }

    .dates-intro {
      font-size: 13px;
      color: #666;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 11px;
      color: #999;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 8px;
    }

    .date-group {
      margin-bottom: 12px;
    }

    .date-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4a90e2;
    }

    button {
      background: white;
      border: 1px solid #ddd;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 1rem;
      margin-bottom: 2rem;
      transition: all 0.2s;
    }

    button:hover {
      background: #f5f5f5;
      border-color: #bbb;
    }

    button:active {
      transform: scale(0.98);
    }

    .response-item {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
      border: 1px solid #eee;
    }

    .response-item strong {
      color: #222;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-top: 1rem;
    }

    .summary-card {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      border: 1px solid #eee;
    }

    .summary-date {
      font-weight: 500;
      font-size: 13px;
      color: #333;
    }

    .summary-count {
      font-size: 24px;
      font-weight: 600;
      color: #4a90e2;
      margin-top: 8px;
    }

    #responses, #summary {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Night Out Availability</h1>
    
    <div class="form-group">
      <label for="name">Your name</label>
      <input type="text" id="name" placeholder="Enter your name">
    </div>

    <div class="form-group">
      <p class="dates-intro">Which evenings work for you?</p>
      
      <div class="section-label">This weekend</div>
      <div class="date-group">
        <label>
          <input type="checkbox" value="2026-06-27" class="date-check">
          <span>Fri, June 27</span>
        </label>
      </div>
      <div class="date-group">
        <label>
          <input type="checkbox" value="2026-06-28" class="date-check">
          <span>Sat, June 28</span>
        </label>
      </div>

      <div class="section-label">July weekdays</div>
      <div class="date-group">
        <label>
          <input type="checkbox" value="2026-07-01" class="date-check">
          <span>Mon, July 1</span>
        </label>
      </div>
      <div class="date-group">
        <label>
          <input type="checkbox" value="2026-07-02" class="date-check">
          <span>Tue, July 2</span>
        </label>
      </div>

      <div class="date-group">
        <label>
          <input type="checkbox" value="2026-07-07" class="date-check">
          <span>Mon, July 7</span>
        </label>
      </div>
      <div class="date-group">
        <label>
          <input type="checkbox" value="2026-07-08" class="date-check">
          <span>Tue, July 8</span>
        </label>
      </div>

      <div class="date-group">
        <label>
          <input type="checkbox" value="2026-07-14" class="date-check">
          <span>Mon, July 14</span>
        </label>
      </div>
      <div class="date-group">
        <label>
          <input type="checkbox" value="2026-07-15" class="date-check">
          <span>Tue, July 15</span>
        </label>
      </div>

      <div class="date-group">
        <label>
          <input type="checkbox" value="2026-07-21" class="date-check">
          <span>Mon, July 21</span>
        </label>
      </div>
      <div class="date-group">
        <label>
          <input type="checkbox" value="2026-07-22" class="date-check">
          <span>Tue, July 22</span>
        </label>
      </div>

      <div class="date-group">
        <label>
          <input type="checkbox" value="2026-07-28" class="date-check">
          <span>Mon, July 28</span>
        </label>
      </div>
      <div class="date-group">
        <label>
          <input type="checkbox" value="2026-07-29" class="date-check">
          <span>Tue, July 29</span>
        </label>
      </div>

      <div style="border-top: 1px solid #eee; margin-top: 12px; padding-top: 12px;">
        <div class="date-group">
          <label>
            <input type="checkbox" value="2026-07-31" class="date-check">
            <span>Fri, July 31</span>
          </label>
        </div>
      </div>
    </div>

    <button onclick="submitResponse()">Submit</button>

    <div id="responses"></div>
    <div id="summary"></div>
  </div>

  <script>
    const responses = JSON.parse(localStorage.getItem('nightOutSurveyResponses') || '[]');

    function submitResponse() {
      const name = document.getElementById('name').value.trim();
      if (!name) {
        alert('Please enter your name');
        return;
      }

      const selected = Array.from(document.querySelectorAll('.date-check:checked')).map(el => el.value);
      if (selected.length === 0) {
        alert('Please select at least one date');
        return;
      }

      responses.push({ name, dates: selected });
      localStorage.setItem('nightOutSurveyResponses', JSON.stringify(responses));

      document.getElementById('name').value = '';
      document.querySelectorAll('.date-check').forEach(el => el.checked = false);

      renderResults();
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr + 'T00:00:00');
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'];
      return `${days[date.getDay()]}, ${months[date.getMonth()]} ${date.getDate()}`;
    }

    function renderResults() {
      const responsesDiv = document.getElementById('responses');
      const summaryDiv = document.getElementById('summary');

      if (responses.length === 0) {
        responsesDiv.innerHTML = '';
        summaryDiv.innerHTML = '';
        return;
      }

      let html = '<h3>Responses</h3>';
      responses.forEach(r => {
        html += `<div class="response-item"><strong>${escapeHtml(r.name)}</strong> — ${r.dates.map(d => formatDate(d)).join(', ')}</div>`;
      });
      responsesDiv.innerHTML = html;

      const dateCounts = {};
      responses.forEach(r => {
        r.dates.forEach(d => {
          dateCounts[d] = (dateCounts[d] || 0) + 1;
        });
      });

      const sorted = Object.entries(dateCounts).sort((a, b) => b[1] - a[1]);

      let summaryHtml = '<h3>Vote count</h3><div class="summary-grid">';
      sorted.forEach(([date, count]) => {
        summaryHtml += `<div class="summary-card"><div class="summary-date">${formatDate(date)}</div><div class="summary-count">${count}</div></div>`;
      });
      summaryHtml += '</div>';
      summaryDiv.innerHTML = summaryHtml;
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    renderResults();
  </script>
</body>
</html>
